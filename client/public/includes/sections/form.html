<section class="form-section" id="form">
  <div class="container">
    <h2>Оформить заявку на перевозку</h2>
    <form class="contact-form">
      <div class="form-group">
        <label>Ваше имя *</label>
        <input type="text" required>
      </div>
      <div class="form-group">
        <label>Телефон *</label>
        <input type="tel" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email">
      </div>
      <div class="form-group">
        <label>Откуда (город, адрес)</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Куда (город, адрес)</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Вес груза (тонн)</label>
        <input type="number">
      </div>
      <div class="form-group">
        <label>Тип кузова</label>
        <select>
          <option>Тент</option>
          <option>Фургон</option>
          <option>Рефрижератор</option>
          <option>Изотерм</option>
        </select>
      </div>
      <button type="submit" class="submit-btn">Отправить заявку</button>
    </form>
  </div>
</section>
