# ============================================
# RENDER.YAML - КОНФИГУРАЦИЯ ДЛЯ RENDER.COM
# ============================================

services:
  # БЭКЕНД (Express + PostgreSQL)
  - type: web
    name: almik-backend
    runtime: node
    root: .
    buildCommand: |
      npm install
      npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: almik-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
    autoDeploy: true

  # ФРОНТЕНД (React статика)
  - type: static
    name: almik-frontend
    root: .
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist/client
    routes:
      # API запросы проксируем на бэкенд
      - type: rewrite
        source: /api/*
        destination: https://almik-backend.onrender.com/api/*
      # Все остальные запросы -> index.html (для React Router)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Кэширование статики
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.jpg
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.png
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.webp
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.svg
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.ico
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=86400
    pullRequestPreviewsEnabled: true
    autoDeploy: true

databases:
  - name: almik-db
    plan: free