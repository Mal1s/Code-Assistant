<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — ООО «АЛМИК» | Грузоперевозки</title>
    <meta name="description" content="Запрошенная страница не существует. Вернитесь на главную или свяжитесь с нами: +7 (901) 117-23-71">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://almik-logistic.ru/404.html">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1a33 0%, #13294b 50%, #0b1a33 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(80px, 15vw, 180px);
            font-weight: 900;
            background: linear-gradient(180deg, #f05a28 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }

        .truck-icon {
            font-size: clamp(40px, 8vw, 80px);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 800;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .subtitle {
            font-size: clamp(14px, 2.5vw, 18px);
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .main-btn {
            display: inline-block;
            background: linear-gradient(135deg, #f05a28 0%, #ff7b3d 100%);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(240, 90, 40, 0.4);
            margin-bottom: 40px;
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 90, 40, 0.6);
        }

        .main-btn i {
            margin-right: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
            text-align: left;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-card:hover {
            background: rgba(240, 90, 40, 0.2);
            border-color: rgba(240, 90, 40, 0.5);
            transform: translateY(-2px);
        }

        .link-card i {
            font-size: 24px;
            color: #f05a28;
            width: 30px;
            text-align: center;
        }

        .link-card span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 14px;
        }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .contact-item:hover {
            color: #f05a28;
        }

        .contact-item i {
            color: #f05a28;
        }

        .timer-text {
            font-size: 13px;
            color: #64748b;
            margin-top: 20px;
        }

        .timer-text span {
            color: #f05a28;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
            .contact-bar {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Иконка грузовика -->
        <div class="truck-icon">🚛</div>
        
        <!-- Код ошибки -->
        <div class="error-code">404</div>
        
        <!-- Заголовок -->
        <h1>Груз не найден!</h1>
        
        <!-- Описание -->
        <p class="subtitle">
            Похоже, страница, которую вы ищете, была перемещена,<br>
            удалена или никогда не существовала.
        </p>

        <!-- Кнопка на главную -->
        <a href="/" class="main-btn">
            <i class="fas fa-home"></i> Вернуться на главную
        </a>

        <!-- Популярные разделы -->
        <div class="links-grid">
            <a href="/?scrollTo=services" class="link-card">
                <i class="fas fa-truck"></i>
                <span>Наши услуги</span>
            </a>
            <a href="/?scrollTo=form" class="link-card">
                <i class="fas fa-calculator"></i>
                <span>Рассчитать стоимость</span>
            </a>
            <a href="/?scrollTo=contacts" class="link-card">
                <i class="fas fa-map-marker-alt"></i>
                <span>Контакты</span>
            </a>
            <a href="/?scrollTo=about" class="link-card">
                <i class="fas fa-building"></i>
                <span>О компании</span>
            </a>
        </div>

        <!-- Контакты -->
        <div class="contact-bar">
            <a href="tel:+79011172371" class="contact-item">
                <i class="fas fa-phone"></i> +7 (901) 117-23-71
            </a>
            <a href="mailto:almik.ks@yandex.ru" class="contact-item">
                <i class="fas fa-envelope"></i> almik.ks@yandex.ru
            </a>
            <a href="https://t.me/Obormotka_byaka" class="contact-item">
                <i class="fab fa-telegram"></i> Telegram
            </a>
        </div>

        <!-- Таймер авторедиректа -->
        <p class="timer-text">
            Вы будете перенаправлены на главную через <span id="countdown">10</span> секунд
        </p>
    </div>

    <!-- Авторедирект через 10 секунд -->
    <script>
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
